name: Update Template READMEs

on:
  push:
    branches:
      - main
    paths:
      - 'hibot-code/templates.json'
      - 'hibot-code/edtech-tutorials.html'
  workflow_dispatch:

jobs:
  update-readmes:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout starter templates (submodules)
        run: |
          cd starter-templates
          for dir in hibot-*/; do
            if [ -d "$dir/.git" ]; then
              cd "$dir"
              git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Cartooli/${dir%/}.git"
              git fetch origin main
              git checkout main
              cd ..
            fi
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate and push READMEs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-template-readmes.js --push

      - name: Report results
        if: always()
        run: |
          echo "✓ Template README update workflow completed"
          echo "Check the logs above for details on each repo."
